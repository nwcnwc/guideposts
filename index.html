<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guideposts — Curated AI Prompts</title>
<meta name="description" content="Curated prompts. Your favorite AI. Personalized answers.">
<meta property="og:title" content="Guideposts">
<meta property="og:description" content="Curated prompts. Your favorite AI. Personalized answers.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://guideposts.nathancheng.com">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f8fa;--text:#1a1a2e;--text2:#555;--border:#e8e8e8;
  --card-bg:#fff;--card-shadow:0 2px 12px rgba(0,0,0,.08);--card-hover-shadow:0 4px 20px rgba(0,0,0,.12);
  --pill-bg:#f0f0f0;--pill-text:#444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--bg2:#1a1a2e;--text:#e8e8e8;--text2:#aaa;--border:#2a2a3e;
  --card-bg:#1a1a2e;--card-shadow:0 2px 12px rgba(0,0,0,.3);--card-hover-shadow:0 4px 20px rgba(0,0,0,.4);
  --pill-bg:#2a2a3e;--pill-text:#bbb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}

/* Header */
.header{text-align:center;padding:3rem 1.5rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo{display:inline-flex;align-items:center;gap:.6rem;font-size:2.2rem;font-weight:800;letter-spacing:-.02em}
.logo svg{width:40px;height:40px}
.subtitle{color:var(--text2);margin-top:.4rem;font-size:1.05rem;font-weight:400}
.theme-toggle{position:absolute;top:1.2rem;right:1.5rem;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:.4rem;border-radius:50%;transition:transform .2s}
.theme-toggle:hover{transform:scale(1.15)}

/* Filters */
.filters{display:flex;gap:.5rem;padding:1rem 1.5rem;overflow-x:auto;justify-content:center;flex-wrap:wrap;background:var(--bg2);border-bottom:1px solid var(--border)}
.filter-btn{padding:.45rem 1.1rem;border-radius:99px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text2);font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Feed */
.feed{max-width:640px;margin:0 auto;padding:1.5rem 1rem 3rem}
.card{background:var(--card-bg);border-radius:16px;box-shadow:var(--card-shadow);padding:1.5rem;margin-bottom:1.25rem;transition:box-shadow .25s,transform .25s;border:1px solid var(--border)}
.card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-1px)}
.card.hidden{display:none}

.card-topic{display:inline-block;font-size:.78rem;font-weight:600;padding:.25rem .7rem;border-radius:99px;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.03em}
.topic-business{background:#e8f5e9;color:#2e7d32}
.topic-career{background:#e3f2fd;color:#1565c0}
.topic-finance{background:#fff3e0;color:#e65100}
.topic-health{background:#fce4ec;color:#c62828}
.topic-tech{background:#ede7f6;color:#4527a0}
.topic-life{background:#fff8e1;color:#f57f17}
[data-theme="dark"] .topic-business{background:#1b3d1e;color:#81c784}
[data-theme="dark"] .topic-career{background:#0d2744;color:#64b5f6}
[data-theme="dark"] .topic-finance{background:#3e2000;color:#ffb74d}
[data-theme="dark"] .topic-health{background:#3e0c0c;color:#ef9a9a}
[data-theme="dark"] .topic-tech{background:#1a0e33;color:#b39ddb}
[data-theme="dark"] .topic-life{background:#3e3200;color:#fff176}

.card-prompt{font-size:1.15rem;line-height:1.55;font-weight:500;margin-bottom:1.2rem;color:var(--text)}

.card-actions{display:flex;align-items:center;justify-content:space-between}
.ai-buttons{display:flex;gap:.6rem;align-items:center}
.ai-buttons span{font-size:.75rem;color:var(--text2);font-weight:500;margin-right:.2rem}
.ai-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;border:none;background:transparent}
.ai-btn:hover{transform:scale(1.12);box-shadow:0 3px 12px rgba(0,0,0,.15)}
.ai-btn svg{width:26px;height:26px}
.ai-btn::after{content:attr(data-tooltip);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:.72rem;background:var(--text);color:var(--bg);padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.ai-btn:hover::after{opacity:1}

.btn-chatgpt{background:#10a37f}
.btn-claude{background:#d97706}
.btn-grok{background:#1d9bf0}
.btn-perplexity{background:#6366f1}

.share-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:.3rem;padding:.4rem .7rem;border-radius:8px;transition:background .2s}
.share-btn:hover{background:var(--pill-bg)}
.share-btn svg{width:18px;height:18px}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:.7rem 1.4rem;border-radius:12px;font-size:.9rem;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Footer */
.footer{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:.85rem;border-top:1px solid var(--border)}
.footer a{font-weight:600;text-decoration:underline;text-underline-offset:2px}

@media(max-width:480px){
  .logo{font-size:1.7rem}
  .logo svg{width:32px;height:32px}
  .subtitle{font-size:.92rem}
  .card{padding:1.2rem}
  .card-prompt{font-size:1.05rem}
  .ai-btn{width:40px;height:40px}
  .ai-btn svg{width:22px;height:22px}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
<header class="header">
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.5" fill="none"/>
      <path d="M20 6 L20 34 M6 20 L34 20" stroke="currentColor" stroke-width="1.5" opacity=".3"/>
      <path d="M20 8 L23 18 L20 16 L17 18 Z" fill="#e74c3c"/>
      <path d="M20 32 L17 22 L20 24 L23 22 Z" fill="currentColor" opacity=".4"/>
    </svg>
    Guideposts
  </div>
  <p class="subtitle">Curated prompts. Your favorite AI. Personalized answers.</p>
</header>

<nav class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="business">Business</button>
  <button class="filter-btn" data-filter="career">Career</button>
  <button class="filter-btn" data-filter="finance">Finance</button>
  <button class="filter-btn" data-filter="health">Health</button>
  <button class="filter-btn" data-filter="tech">Tech</button>
  <button class="filter-btn" data-filter="life">Life</button>
</nav>

<main class="feed" id="feed"></main>

<footer class="footer">Created by <a href="https://nathancheng.com" target="_blank" rel="noopener">Nathan Cheng</a></footer>
<div class="toast" id="toast"></div>

<script>
const guideposts = [
  {id:1,topic:"business",emoji:"💼",prompt:"I'm thinking about starting a side business while working full-time. What are the 3 most important things I should consider?"},
  {id:2,topic:"career",emoji:"🎓",prompt:"I have 10 years of experience but feel stuck. Create a 90-day plan to reinvent my career using AI tools."},
  {id:3,topic:"finance",emoji:"🏡",prompt:"I'm a first-time home buyer with $500K budget. Walk me through a strategy to find and close without overpaying."},
  {id:4,topic:"health",emoji:"🧠",prompt:"Design a science-backed morning routine for someone who wants more energy, focus, and less anxiety. Include timing."},
  {id:5,topic:"tech",emoji:"💻",prompt:"I want to build my first web app but have no coding experience. What's the fastest path from zero to a working prototype using AI?"},
  {id:6,topic:"life",emoji:"🍳",prompt:"I want to meal prep for the week but I'm bored of the same recipes. Give me a diverse 7-day plan with grocery list, under $75."},
  {id:7,topic:"business",emoji:"📊",prompt:"My small business is doing $500K/year. What are the top 5 AI tools I should implement right now to double efficiency?"},
  {id:8,topic:"career",emoji:"🎯",prompt:"Write me a LinkedIn headline and summary that positions me as an AI-savvy professional. I work in [my field]."},
  {id:9,topic:"finance",emoji:"💰",prompt:"I have $10K to invest and a 10-year horizon. Compare three strategies: index funds, individual stocks, and crypto allocation."},
  {id:10,topic:"health",emoji:"🏋️",prompt:"Create a beginner-friendly 4-week workout plan I can do at home with no equipment. Include progressive difficulty."}
];

const aiLinks = [
  {name:"ChatGPT",cls:"btn-chatgpt",base:"https://chatgpt.com/?q=",svg:'<svg viewBox="0 0 24 24" fill="white"><path d="M22.28 9.37a5.93 5.93 0 0 0-.51-4.89 6.01 6.01 0 0 0-6.47-2.91A5.93 5.93 0 0 0 10.82.01a6.01 6.01 0 0 0-5.73 4.15 5.93 5.93 0 0 0-3.97 2.88 6.01 6.01 0 0 0 .74 7.04 5.93 5.93 0 0 0 .51 4.89 6.01 6.01 0 0 0 6.47 2.91 5.93 5.93 0 0 0 4.48 1.56 6.01 6.01 0 0 0 5.73-4.15 5.93 5.93 0 0 0 3.97-2.88 6.01 6.01 0 0 0-.74-7.04zM13.18 22.3a4.5 4.5 0 0 1-2.88-1.04l.14-.08 4.78-2.76a.78.78 0 0 0 .39-.67v-6.74l2.02 1.17a.07.07 0 0 1 .04.06v5.58a4.52 4.52 0 0 1-4.49 4.48zM3.6 18.22a4.49 4.49 0 0 1-.54-3.02l.14.09 4.78 2.76a.77.77 0 0 0 .78 0l5.83-3.37v2.33a.07.07 0 0 1-.03.06l-4.83 2.79a4.52 4.52 0 0 1-6.13-1.64zM2.34 7.89A4.49 4.49 0 0 1 4.69 5.9v5.69a.78.78 0 0 0 .39.67l5.83 3.37-2.02 1.17a.07.07 0 0 1-.07 0L4 13.99a4.52 4.52 0 0 1-1.66-6.1zM19.42 11.97l-5.83-3.37 2.02-1.17a.07.07 0 0 1 .07 0l4.83 2.79a4.51 4.51 0 0 1-.7 8.14v-5.72a.78.78 0 0 0-.39-.67zM21.43 8.8l-.14-.09-4.78-2.76a.77.77 0 0 0-.78 0l-5.83 3.37V6.99a.07.07 0 0 1 .03-.06l4.83-2.79a4.51 4.51 0 0 1 6.67 4.66zM7.62 13.37l-2.02-1.17a.07.07 0 0 1-.04-.06V6.56a4.51 4.51 0 0 1 7.4-3.46l-.14.08-4.78 2.76a.78.78 0 0 0-.39.67l-.03 6.76zM8.62 11.5 11 10.11V12.89l-2.38 1.39V11.5z"/></svg>'},
  {name:"Claude",cls:"btn-claude",base:"https://claude.ai/new?q=",svg:'<svg viewBox="0 0 24 24" fill="white"><path d="M16.98 5.15L12 2 7.02 5.15 2 8.3v7.4l5.02 3.15L12 22l4.98-3.15L22 15.7V8.3l-5.02-3.15zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>'},
  {name:"Grok",cls:"btn-grok",base:"https://grok.com/?q=",svg:'<svg viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>'},
  {name:"Perplexity",cls:"btn-perplexity",base:"https://www.perplexity.ai/search?q=",svg:'<svg viewBox="0 0 24 24" fill="white"><path d="M12 2L4 6v6l8 4 8-4V6l-8-4zm0 2.2L17.6 7 12 9.8 6.4 7 12 4.2zM5.5 8.1l5.5 2.7v5.8l-5.5-2.7V8.1zm13 0v5.8l-5.5 2.7v-5.8l5.5-2.7zM12 18.5l-3-1.5v2.5l3 1.5 3-1.5V17l-3 1.5z"/></svg>'}
];

function renderCards(){
  const feed=document.getElementById('feed');
  feed.innerHTML=guideposts.map(g=>{
    const buttons=aiLinks.map(ai=>
      `<a class="ai-btn ${ai.cls}" href="${ai.base}${encodeURIComponent(g.prompt)}" target="_blank" rel="noopener" data-tooltip="${ai.name}">${ai.svg}</a>`
    ).join('');
    return `<article class="card" id="gp-${g.id}" data-topic="${g.topic}">
      <div class="card-topic topic-${g.topic}">${g.emoji} ${g.topic}</div>
      <p class="card-prompt">"${g.prompt}"</p>
      <div class="card-actions">
        <div class="ai-buttons"><span>Ask&nbsp;AI:</span>${buttons}</div>
        <button class="share-btn" onclick="share('gp-${g.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share</button>
      </div>
    </article>`;
  }).join('');
}

function share(id){
  const url=`${location.origin}${location.pathname}#${id}`;
  navigator.clipboard.writeText(url).then(()=>showToast('Link copied!')).catch(()=>showToast('Could not copy link'));
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  const f=e.target.dataset.filter;
  document.querySelectorAll('.card').forEach(c=>{c.classList.toggle('hidden',f!=='all'&&c.dataset.topic!==f)});
});

function toggleTheme(){
  const d=document.documentElement;
  const dark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dark?'light':'dark');
  document.querySelector('.theme-toggle').textContent=dark?'🌙':'☀️';
  localStorage.setItem('theme',dark?'light':'dark');
}

(function(){
  const saved=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',saved);
  document.querySelector('.theme-toggle').textContent=saved==='dark'?'☀️':'🌙';
  renderCards();
  if(location.hash){const el=document.querySelector(location.hash);if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),300)}
})();
</script>
</body>
</html>
